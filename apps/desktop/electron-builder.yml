# electron-builder 配置 —— Phase 5 打包时使用。
# 当前 Phase 1 仅作骨架占位，实际打包需配合 PyInstaller 产出 nexus-server。

appId: dev.nexusresearch.app
productName: NexusResearch
copyright: Copyright © 2026 NexusResearch

directories:
  output: dist
  buildResources: resources

# 前端构建产物（@nexus/web build 输出）作为 extraResource 打入
extraResources:
  - from: ../web/dist
    to: web
    filter: ['**/*']

# Python sidecar（PyInstaller 产物，Phase 5 产出）
# extraFiles:
#   - from: ../../server/dist/nexus-server
#     to: nexus-server

files:
  - dist/**/*
  - package.json

win:
  target:
    - nsis
  artifactName: ${productName}-${version}-${arch}.${ext}

mac:
  target:
    - dmg
  category: public.app-category.productivity
  artifactName: ${productName}-${version}-${arch}.${ext}

linux:
  target:
    - AppImage
  category: Office
  artifactName: ${productName}-${version}-${arch}.${ext}

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
