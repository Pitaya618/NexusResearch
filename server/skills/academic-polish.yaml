id: academic-polish
name: 学术润色
description: AI 学术语言润色，提升表达专业性与规范性
icon: "✍️"
category: ["写作"]
module: ["essay", "paper"]
version: "2.1.0"
author: NexusResearch

prompt: |
  你是学术写作润色专家。请按「{{ mode }}」模式润色以下文本：

  {{ selected_text }}

  模式说明：
  - academic（学术规范）：使用严谨学术用语，被动语态，避免口语化
  - concise（简洁精炼）：删减冗余，信息密度最大化
  - expand（详细展开）：补充必要解释与过渡，增强可读性
  - keepOriginal（保持原意）：仅修正语法错误，不改写表达

  要求：
  1. 保持原文核心含义不变
  2. 仅输出润色后的文本，不要解释修改理由
  3. 保留专业术语与公式符号
